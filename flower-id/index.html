<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1d3d2c">
  <title>זיהוי פרחים ישראליים</title>
  <style>
    /* ===== Google Fonts ===== */
    @import url('https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700;900&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap');

    /* ===== CSS Variables ===== */
    :root {
      --parchment:     #faf7f0;
      --parchment-2:   #f0ebe0;
      --forest:        #1d3d2c;
      --forest-mid:    #2d5c40;
      --sage:          #4d7f62;
      --sage-light:    #8cbfa0;
      --sage-faint:    #e4f0e8;
      --gold:          #b8914a;
      --gold-pale:     #f0e2c0;
      --text-dark:     #1a2e20;
      --text-mid:      #3d5040;
      --text-muted:    #7a8f7e;
      --white:         #fffef9;
      --error:         #8b3a2c;
      --shadow:        0 2px 16px rgba(29, 61, 44, 0.10);
      --shadow-raised: 0 6px 32px rgba(29, 61, 44, 0.16);
      --radius:        16px;
      --radius-sm:     10px;

      /* Legacy aliases for JS-set inline styles */
      --green-dark:   #1d3d2c;
      --green-mid:    #4d7f62;
      --green-light:  #e4f0e8;
      --green-faint:  #f0ebe0;
    }

    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Frank Ruhl Libre', 'Arial Hebrew', Georgia, serif;
      font-size: 17px;
      line-height: 1.65;
      color: var(--text-dark);
      background-color: var(--parchment);
      background-image:
        radial-gradient(ellipse 80% 55% at 25% 5%,  rgba(77, 127, 98, 0.08) 0%, transparent 65%),
        radial-gradient(ellipse 60% 45% at 78% 92%, rgba(184, 145, 74, 0.07) 0%, transparent 65%);
      background-attachment: fixed;
      min-height: 100vh;
    }

    /* ===== Screens ===== */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      min-height: 100dvh;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 28px 20px calc(36px + env(safe-area-inset-bottom, 0px));
    }
    .screen.active { display: flex; }

    /* ===== Shared Header ===== */
    #app-header {
      position: fixed;
      top: 0;
      right: 0;
      left: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      padding: calc(14px + env(safe-area-inset-top, 0px)) 18px 14px;
      background: var(--forest);
      color: var(--white);
      max-width: 480px;
      margin: 0 auto;
      box-shadow: 0 2px 20px rgba(0,0,0,0.22);
    }
    #app-header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(184,145,74,0.6), transparent);
    }
    #app-header.hidden { display: none; }
    #btn-back {
      background: none;
      border: none;
      color: rgba(255,255,255,0.82);
      font-size: 20px;
      cursor: pointer;
      padding: 6px 10px;
      margin-left: 6px;
      border-radius: var(--radius-sm);
      line-height: 1;
      transition: background 0.18s, color 0.18s;
    }
    #btn-back:hover { background: rgba(255,255,255,0.12); color: var(--white); }
    #header-title {
      font-family: 'Frank Ruhl Libre', 'Arial Hebrew', Georgia, serif;
      font-size: 19px;
      font-weight: 700;
      letter-spacing: 0.01em;
      flex: 1;
      text-align: center;
    }
    .header-spacer { width: 44px; }
    .has-header {
      padding-top: calc(76px + env(safe-area-inset-top, 0px));
    }

    /* ===== Buttons ===== */
    .btn {
      display: block;
      width: 100%;
      max-width: 320px;
      padding: 15px 28px;
      font-size: 17px;
      font-family: 'Frank Ruhl Libre', 'Arial Hebrew', Georgia, serif;
      font-weight: 700;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: transform 0.12s ease, box-shadow 0.2s ease, background 0.2s ease;
      letter-spacing: 0.01em;
      position: relative;
      overflow: hidden;
    }
    .btn:active { transform: scale(0.97); }
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.18s;
    }
    .btn:active::after { background: rgba(255,255,255,0.07); }
    .btn-primary {
      background: linear-gradient(145deg, var(--forest) 0%, var(--forest-mid) 100%);
      color: var(--white);
      box-shadow: 0 4px 18px rgba(29,61,44,0.30), inset 0 1px 0 rgba(255,255,255,0.07);
    }
    .btn-primary:hover { box-shadow: 0 6px 26px rgba(29,61,44,0.40), inset 0 1px 0 rgba(255,255,255,0.07); }
    .btn-secondary {
      background: var(--white);
      color: var(--forest);
      border: 1.5px solid var(--sage-light);
      box-shadow: var(--shadow);
    }
    .btn-secondary:hover { border-color: var(--sage); box-shadow: var(--shadow-raised); }
    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      text-decoration: none;
      box-shadow: none;
      font-weight: 400;
      font-size: 15px;
      border: none;
    }
    .btn-ghost:hover { color: var(--forest); }
    .btn-outline {
      background: transparent;
      color: var(--forest);
      border: 1.5px solid var(--sage);
    }
    .btn-outline:hover { background: var(--sage-faint); border-color: var(--forest); }
    .action-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      margin-top: 36px;
      gap: 10px;
    }
    .action-group .btn + .btn,
    .action-group .btn + p,
    .action-group p { margin-top: 0; }

    /* ===== Landing Screen ===== */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      flex: 1;
      justify-content: center;
      padding: 0 10px;
      position: relative;
    }
    .hero::before {
      content: '';
      position: absolute;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(77,127,98,0.12) 0%, transparent 70%);
      pointer-events: none;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .app-logo {
      font-size: 80px;
      margin-bottom: 20px;
      line-height: 1;
      filter: drop-shadow(0 4px 18px rgba(77,127,98,0.38));
      animation: bloom 3.5s ease-in-out infinite;
      position: relative;
      z-index: 1;
    }
    @keyframes bloom {
      0%, 100% { transform: scale(1) rotate(-2deg); filter: drop-shadow(0 4px 16px rgba(77,127,98,0.35)); }
      50%       { transform: scale(1.05) rotate(2deg); filter: drop-shadow(0 7px 26px rgba(77,127,98,0.55)); }
    }
    .hero h1 {
      font-family: 'Frank Ruhl Libre', 'Arial Hebrew', Georgia, serif;
      font-size: 30px;
      font-weight: 900;
      color: var(--forest);
      margin-bottom: 10px;
      line-height: 1.2;
      letter-spacing: -0.01em;
      position: relative;
      z-index: 1;
    }
    .hero .subtitle {
      font-size: 16px;
      color: var(--text-muted);
      max-width: 280px;
      font-weight: 400;
      line-height: 1.65;
      position: relative;
      z-index: 1;
    }
    .video-future-note {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      opacity: 0.65;
    }
    .btn-disabled {
      opacity: 0.35;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* ===== Preview Screen ===== */
    .preview-container {
      width: 100%;
      max-width: 400px;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-raised);
      background: var(--text-dark);
      border: 3px solid rgba(255,255,255,0.88);
      outline: 1px solid var(--sage-light);
    }
    #preview-img {
      width: 100%;
      max-height: 400px;
      object-fit: contain;
      display: block;
    }

    /* ===== Loading Screen ===== */
    .loading-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .spinner {
      width: 60px;
      height: 60px;
      border: 3px solid var(--sage-faint);
      border-top-color: transparent;
      border-right-color: var(--forest);
      border-bottom-color: var(--sage);
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.5, 0.1, 0.5, 0.9) infinite;
      box-shadow: 0 0 18px rgba(77,127,98,0.18);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: 'Frank Ruhl Libre', 'Arial Hebrew', Georgia, serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--forest);
    }
    .loading-sub { font-size: 15px; color: var(--text-muted); margin-top: -12px; }

    /* ===== Result Screen ===== */
    .result-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-raised);
      overflow: hidden;
      width: 100%;
      max-width: 440px;
      border: 1px solid rgba(77,127,98,0.12);
    }
    .result-photo {
      width: 100%;
      height: 240px;
      object-fit: cover;
      display: block;
    }
    .result-photo-placeholder {
      width: 100%;
      height: 240px;
      background: linear-gradient(135deg, var(--sage-faint), var(--gold-pale));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
    }
    .result-body { padding: 22px 20px 20px; }
    .result-body .btn { max-width: none; }
    .result-confidence-badge {
      display: inline-flex;
      align-items: center;
      background: var(--gold-pale);
      color: var(--gold);
      font-size: 12px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border: 1px solid rgba(184,145,74,0.25);
    }
    .result-name {
      font-family: 'Frank Ruhl Libre', 'Arial Hebrew', Georgia, serif;
      font-size: 30px;
      font-weight: 900;
      color: var(--forest);
      margin-bottom: 5px;
      line-height: 1.25;
      letter-spacing: -0.01em;
    }
    .result-sci {
      font-family: 'EB Garamond', 'Times New Roman', Georgia, serif;
      font-size: 16px;
      font-style: italic;
      color: var(--text-muted);
      margin-bottom: 16px;
      letter-spacing: 0.02em;
    }
    .result-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--sage-light), transparent);
      margin: 16px 0;
      opacity: 0.65;
    }
    .result-summary { font-size: 15.5px; color: var(--text-mid); line-height: 1.78; margin-bottom: 16px; }
    .result-family-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 18px;
      background: var(--sage-faint);
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      border-right: 3px solid var(--sage);
    }
    .result-family-label { font-weight: 700; color: var(--forest-mid); }
    #btn-new-search { margin-top: 10px; }

    /* ===== Error Screen ===== */
    .error-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-raised);
      padding: 32px 24px;
      width: 100%;
      max-width: 440px;
      text-align: center;
      border: 1px solid rgba(77,127,98,0.10);
    }
    .error-icon { font-size: 56px; margin-bottom: 14px; line-height: 1; }
    .error-title {
      font-family: 'Frank Ruhl Libre', 'Arial Hebrew', Georgia, serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 10px;
    }
    .error-msg   { font-size: 16px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.6; }
    .error-tips {
      text-align: right;
      padding: 14px 16px 14px 12px;
      background: var(--sage-faint);
      border-radius: var(--radius-sm);
      margin-bottom: 24px;
      list-style: none;
      border: 1px solid rgba(77,127,98,0.15);
    }
    .error-tips li {
      font-size: 15px;
      color: var(--text-mid);
      padding: 5px 0;
      padding-right: 22px;
      position: relative;
    }
    .error-tips li::before {
      content: '✦';
      position: absolute;
      right: 0;
      color: var(--sage);
      font-size: 10px;
      top: 9px;
    }
    #btn-try-again { margin: 0 auto; }

    /* ===== Candidates Screen ===== */
    .candidates-intro {
      font-size: 16px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 20px;
      max-width: 340px;
      line-height: 1.6;
    }
    .candidates-list {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .candidate-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      cursor: pointer;
      border: 1.5px solid rgba(77,127,98,0.10);
      transition: border-color 0.15s, transform 0.12s, box-shadow 0.15s;
    }
    .candidate-card:hover  {
      border-color: var(--sage);
      box-shadow: var(--shadow-raised);
      transform: translateY(-1px);
    }
    .candidate-card:active { transform: scale(0.98); }
    .candidate-thumb {
      width: 72px;
      height: 72px;
      border-radius: var(--radius-sm);
      object-fit: cover;
      flex-shrink: 0;
      background: var(--sage-faint);
    }
    .candidate-thumb-placeholder {
      width: 72px;
      height: 72px;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--sage-faint), var(--gold-pale));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      flex-shrink: 0;
    }
    .candidate-info { flex: 1; min-width: 0; }
    .candidate-sci  {
      font-family: 'EB Garamond', 'Times New Roman', Georgia, serif;
      font-size: 16px;
      font-weight: 500;
      font-style: italic;
      color: var(--text-dark);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .candidate-family {
      font-size: 13px;
      color: var(--text-muted);
    }
    .candidate-score {
      font-size: 12px;
      font-weight: 700;
      color: var(--forest-mid);
      background: var(--sage-faint);
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
      border: 1px solid rgba(77,127,98,0.20);
      letter-spacing: 0.02em;
    }

    /* ===== KKL Structured Data Grid ===== */
    .kkl-data {
      margin-bottom: 16px;
    }
    .kkl-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: rgba(77,127,98,0.12);
      border: 1px solid rgba(77,127,98,0.15);
      border-radius: var(--radius-sm);
      overflow: hidden;
      margin-bottom: 0;
    }
    .kkl-field {
      background: var(--white);
      padding: 9px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .kkl-field.full-width {
      grid-column: 1 / -1;
    }
    .kkl-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .kkl-value {
      font-size: 14px;
      color: var(--text-dark);
      line-height: 1.4;
      font-family: 'Frank Ruhl Libre', 'Arial Hebrew', Georgia, serif;
    }
    .kkl-value.empty {
      color: var(--text-muted);
      font-style: italic;
    }
    .kkl-url-row {
      margin-top: 8px;
      text-align: center;
    }
    .kkl-url-row a {
      font-size: 13px;
      color: var(--sage);
      text-decoration: none;
    }
    .kkl-url-row a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- Hidden file inputs -->
  <input type="file" id="input-camera"  accept="image/*" capture="environment" hidden>
  <input type="file" id="input-gallery" accept="image/*" hidden>

  <!-- Shared header (hidden on landing) -->
  <header id="app-header" class="hidden" role="banner">
    <button id="btn-back" aria-label="חזור לעמוד הקודם">&#8592;</button>
    <span id="header-title">זיהוי פרחים</span>
    <div class="header-spacer" aria-hidden="true"></div>
  </header>

  <!-- ==================== SCREEN: Landing ==================== -->
  <main id="screen-landing" class="screen active" role="main">
    <div class="hero">
      <div class="app-logo" aria-hidden="true">🌸</div>
      <h1>זיהוי פרחים ישראליים</h1>
      <p class="subtitle">צלם או העלה תמונה של פרח וגלה מה שמו</p>
    </div>
    <div class="action-group">
      <button id="btn-camera"  class="btn btn-primary">📷&nbsp; צלם פרח</button>
      <button id="btn-gallery" class="btn btn-secondary">🖼️&nbsp; בחר מהגלריה</button>
      <!-- Future phase: live video -->
      <button id="btn-video" class="btn btn-secondary btn-disabled" disabled aria-disabled="true">
        🎥&nbsp; וידאו חי
      </button>
      <p class="video-future-note">זיהוי בוידאו חי — בקרוב</p>
    </div>
  </main>

  <!-- ==================== SCREEN: Preview ==================== -->
  <main id="screen-preview" class="screen has-header" role="main">
    <div class="preview-container">
      <img id="preview-img" src="" alt="תמונה שנבחרה לזיהוי">
    </div>
    <div class="action-group">
      <button id="btn-identify" class="btn btn-primary">🔍&nbsp; זהה פרח</button>
      <button id="btn-retake"   class="btn btn-secondary">↩&nbsp; בחר תמונה אחרת</button>
    </div>
  </main>

  <!-- ==================== SCREEN: Loading ==================== -->
  <main id="screen-loading" class="screen" role="main" aria-live="polite" aria-busy="true">
    <div class="loading-content">
      <div class="spinner" aria-hidden="true"></div>
      <p class="loading-text">מזהה את הפרח...</p>
      <p class="loading-sub">זה עשוי לקחת מספר שניות</p>
    </div>
  </main>

  <!-- ==================== SCREEN: Result ==================== -->
  <main id="screen-result" class="screen has-header" role="main">
    <div class="result-card" role="article">
      <div id="result-img-wrap"></div>
      <div class="result-body">
        <span id="result-confidence" class="result-confidence-badge"></span>
        <h2 id="result-heb-name" class="result-name"></h2>
        <p  id="result-sci-name" class="result-sci"></p>
        <div class="result-divider" aria-hidden="true"></div>
        <div id="result-family-row" class="result-family-row" style="display:none">
          <span class="result-family-label">משפחה:</span>
          <span id="result-family"></span>
        </div>
        <div id="result-kkl-data" class="kkl-data" style="display:none"></div>
        <p id="result-summary" class="result-summary"></p>
        <div class="result-divider" aria-hidden="true"></div>
        <a id="result-more-info"
           class="btn btn-outline"
           href="#"
           target="_blank"
           rel="noopener noreferrer"
           style="display:none">
          📖&nbsp; למידע נוסף
        </a>
        <button id="btn-new-search" class="btn btn-secondary">🔄&nbsp; זהה פרח נוסף</button>
      </div>
    </div>
  </main>

  <!-- ==================== SCREEN: Candidates ==================== -->
  <main id="screen-candidates" class="screen has-header" role="main">
    <p class="candidates-intro">לא בטוחים — מצאנו כמה אפשרויות. בחר את הפרח הנכון:</p>
    <div id="candidates-list" class="candidates-list"></div>
    <button id="btn-candidates-new" class="btn btn-secondary" style="margin-top:20px">🔄&nbsp; זהה פרח נוסף</button>
  </main>

  <!-- ==================== SCREEN: Error ==================== -->
  <main id="screen-error" class="screen has-header" role="main" aria-live="assertive">
    <div class="error-card">
      <div id="error-icon"    class="error-icon" aria-hidden="true"></div>
      <h2  id="error-title"   class="error-title"></h2>
      <p   id="error-message" class="error-msg"></p>
      <ul  id="error-tips"    class="error-tips" style="display:none"></ul>
      <button id="btn-try-again" class="btn btn-primary">נסה שוב</button>
    </div>
  </main>

  <script>
  'use strict';

  // ============================================================
  // PLANTNET API KEY — from my.plantnet.org
  // ============================================================
  const PLANTNET_API_KEY = '2b104AykLXSLUwqSdEtABUAU0O';

  const PLANTNET_URL = 'https://my-api.plantnet.org/v2/identify/all';
  const CONFIDENCE_THRESHOLD = 0.15;
  const CONFIDENCE_LOW       = 0.65;
  const WIKI_HE_URL      = 'https://he.wikipedia.org/api/rest_v1/page/summary/';
  const WIKIDATA_SPARQL  = 'https://query.wikidata.org/sparql';
  const DEBUG_MODE       = new URLSearchParams(window.location.search).get('debug') === '1';

  // ===== State =====
  const STATE = {
    currentFile:    null,
    previewDataURL: null,
    gpsCoords:      null,   // { lat, lon } — fetched once on first use
  };

  // Israel center fallback coordinates
  const ISRAEL_LAT = 31.5;
  const ISRAEL_LON = 34.8;

  function getGPS() {
    return new Promise(resolve => {
      if (!navigator.geolocation) { resolve(null); return; }
      navigator.geolocation.getCurrentPosition(
        pos => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
        ()  => resolve(null),
        { timeout: 5000, maximumAge: 60000 }
      );
    });
  }

  // ===== Screen Management =====
  const SCREEN_IDS = ['landing', 'preview', 'loading', 'result', 'candidates', 'error'];

  function showScreen(name) {
    SCREEN_IDS.forEach(id => {
      const el = document.getElementById('screen-' + id);
      el.classList.toggle('active', id === name);
      el.classList.toggle('hidden', id !== name);
    });
    const header = document.getElementById('app-header');
    header.classList.toggle('hidden', name === 'landing' || name === 'loading');
  }

  // ===== File Handling =====

  function handleFileSelected(event) {
    const files = event.target.files;
    if (!files || files.length === 0) return; // cancelled (iOS)

    // Extract File BEFORE resetting — mobile browsers invalidate FileList on reset
    const file = files[0];
    event.target.value = '';

    if (!file.type.startsWith('image/')) {
      alert('נא לבחור קובץ תמונה בלבד');
      return;
    }
    if (file.size === 0) {
      alert('הקובץ שנבחר ריק. נא לנסות שוב.');
      return;
    }
    if (file.size > 10 * 1024 * 1024) {
      alert('התמונה גדולה מדי (מקסימום 10MB). נא לבחור תמונה קטנה יותר.');
      return;
    }

    STATE.currentFile = file;
    const reader = new FileReader();
    reader.onload = function(e) {
      STATE.previewDataURL = e.target.result;
      document.getElementById('preview-img').src = STATE.previewDataURL;
      showScreen('preview');
    };
    reader.readAsDataURL(file);
  }

  // ===== PlantNet API =====

  async function callPlantNetAPI(blob, filename) {
    const fd = new FormData();
    fd.append('images', blob, filename || 'flower.jpg');
    fd.append('organs', 'flower');

    const url = `${PLANTNET_URL}?lang=he&api-key=${PLANTNET_API_KEY}`;

    // Do NOT set Content-Type — browser must set multipart boundary
    const response = await fetch(url, { method: 'POST', body: fd });

    if (!response.ok) {
      const errBody = await response.json().catch(() => ({}));
      console.error('PlantNet error', response.status, errBody);
      const err = new Error('API error');
      err.type = 'api';
      err.status = response.status;
      throw err;
    }

    return response.json();
  }

  // ===== Wikidata + Wikipedia Hebrew =====

  // Query Wikidata by exact taxon name (P225) → returns Hebrew label + Hebrew Wikipedia title
  async function callWikidata(taxonName) {
    try {
      const sparql = `SELECT ?heLabel ?heWikiTitle WHERE {
        ?item wdt:P225 "${taxonName.replace(/"/g, '')}".
        OPTIONAL { ?item rdfs:label ?heLabel. FILTER(LANG(?heLabel)="he") }
        OPTIONAL {
          ?article schema:about ?item;
                   schema:inLanguage "he";
                   schema:isPartOf <https://he.wikipedia.org/>;
                   schema:name ?heWikiTitle.
        }
      } LIMIT 1`;
      const resp = await fetch(
        WIKIDATA_SPARQL + '?query=' + encodeURIComponent(sparql) + '&format=json',
        { headers: { 'Accept': 'application/sparql-results+json' } }
      );
      if (!resp.ok) return null;
      const data = await resp.json();
      const b = data.results && data.results.bindings && data.results.bindings[0];
      if (!b) return null;
      return {
        hebrewLabel: b.heLabel      ? b.heLabel.value      : null,
        wikiTitle:   b.heWikiTitle  ? b.heWikiTitle.value  : null,
      };
    } catch (e) {
      return null;
    }
  }

  // Fetch Hebrew Wikipedia summary by article title
  async function callWikipediaHE(hebrewTitle) {
    try {
      const resp = await fetch(WIKI_HE_URL + encodeURIComponent(hebrewTitle));
      if (!resp.ok) return null;
      const data = await resp.json();
      return {
        extract: data.extract || null,
        url:     (data.content_urls && data.content_urls.desktop)
                   ? data.content_urls.desktop.page : null,
      };
    } catch (e) {
      return null;
    }
  }

  // Get Hebrew name for a taxonomic family (also via Wikidata P225)
  async function callFamilyHE(familySciName) {
    if (!familySciName) return null;
    try {
      const sparql = `SELECT ?heLabel WHERE {
        ?item wdt:P225 "${familySciName.replace(/"/g, '')}".
        ?item rdfs:label ?heLabel.
        FILTER(LANG(?heLabel)="he")
      } LIMIT 1`;
      const resp = await fetch(
        WIKIDATA_SPARQL + '?query=' + encodeURIComponent(sparql) + '&format=json',
        { headers: { 'Accept': 'application/sparql-results+json' } }
      );
      if (!resp.ok) return null;
      const data = await resp.json();
      const b = data.results && data.results.bindings && data.results.bindings[0];
      return b && b.heLabel ? b.heLabel.value : null;
    } catch (e) {
      return null;
    }
  }

  // iNaturalist taxa API — Hebrew common name fallback
  async function callInatTaxa(sciName) {
    try {
      const resp = await fetch(
        'https://api.inaturalist.org/v1/taxa?q=' + encodeURIComponent(sciName) +
        '&locale=he&per_page=5'
      );
      if (!resp.ok) return null;
      const data = await resp.json();
      // Find the result whose scientific name exactly matches
      const taxon = (data.results || []).find(
        t => (t.name || '').toLowerCase() === sciName.toLowerCase()
      );
      if (!taxon) return null;
      // preferred_common_name is already locale-filtered by &locale=he
      if (taxon.preferred_common_name) return taxon.preferred_common_name;
      // Fallback: scan names array for Hebrew entries
      const heName = (taxon.names || []).find(
        n => n.locale === 'he' && n.name
      );
      return heName ? heName.name : null;
    } catch (e) {
      return null;
    }
  }

  // Hebrew Wikipedia full-text search fallback — with genus validation to avoid false positives
  async function searchWikipediaHE(sciName) {
    try {
      const genus = sciName.trim().split(/\s+/)[0];
      const searchResp = await fetch(
        'https://he.wikipedia.org/w/api.php?action=query&list=search' +
        '&srsearch=' + encodeURIComponent(sciName) +
        '&srlimit=1&format=json&origin=*'
      );
      if (!searchResp.ok) return null;
      const searchData = await searchResp.json();
      const hits = searchData.query && searchData.query.search;
      const hebrewTitle = hits && hits.length > 0 ? hits[0].title : null;
      if (!hebrewTitle) return null;

      // Fetch the summary and validate: genus must appear in the extract
      const summaryResp = await fetch(WIKI_HE_URL + encodeURIComponent(hebrewTitle));
      if (!summaryResp.ok) return null;
      const data = await summaryResp.json();
      const extract = data.extract || '';
      // Reject if the article's opening paragraph doesn't mention the genus
      if (!extract.includes(genus)) return null;

      return {
        title:   hebrewTitle,
        extract: extract || null,
        url:     (data.content_urls && data.content_urls.desktop)
                   ? data.content_urls.desktop.page : null,
      };
    } catch (e) {
      return null;
    }
  }

  // Fetch thumbnail from English Wikipedia by scientific name
  async function fetchEnWikiThumbnail(sciName) {
    try {
      const resp = await fetch(
        'https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(sciName)
      );
      if (!resp.ok) return null;
      const data = await resp.json();
      return (data.thumbnail && data.thumbnail.source) ? data.thumbnail.source : null;
    } catch (e) {
      return null;
    }
  }

  // "More info" URL — priority chain:
  //   1. Species Hebrew Wikipedia (confirmed via Wikidata)
  //   2. Genus Hebrew Wikipedia (confirmed via Wikidata)
  //   3. Genus Flora of Israel page
  //   4. null → hide button
  function buildMoreInfoUrl(speciesWikiUrl, genusWikiUrl, sciName) {
    if (speciesWikiUrl) return speciesWikiUrl;
    if (genusWikiUrl)   return genusWikiUrl;
    const genus = sciName.trim().split(/\s+/)[0];
    if (genus) return 'https://flora.org.il/plants/systematics/' + genus.toLowerCase() + '/';
    return null;
  }

  // ===== Result Processing =====

  // Full Wikidata + Wikipedia lookup for a single chosen species
  async function resolveAndRender(sciName, familySci, score, apiImageURL) {
    showScreen('loading');

    const genus = sciName.trim().split(/\s+/)[0];

    // Parallel: species Wikidata + genus Wikidata + family Hebrew name + iNaturalist Hebrew name
    const [speciesWDResult, genusWDResult, hebrewFamilyResult, inatResult] = await Promise.allSettled([
      callWikidata(sciName),
      genus !== sciName ? callWikidata(genus) : Promise.resolve(null),
      callFamilyHE(familySci),
      callInatTaxa(sciName),
    ]);

    const speciesWD    = speciesWDResult.status === 'fulfilled' ? speciesWDResult.value : null;
    const genusWD      = genusWDResult.status  === 'fulfilled' ? genusWDResult.value   : null;
    const inatHebrew   = inatResult.status     === 'fulfilled' ? inatResult.value      : null;
    // Hebrew name: Wikidata label → iNaturalist common name → nothing
    const hebrewName   = (speciesWD && speciesWD.hebrewLabel) || inatHebrew || null;
    const hebrewFamily = hebrewFamilyResult.status === 'fulfilled' ? hebrewFamilyResult.value : null;

    // Species Wikipedia
    let wikiSummary     = null;
    let speciesWikiUrl  = null;
    if (speciesWD && speciesWD.wikiTitle) {
      const wikiData = await callWikipediaHE(speciesWD.wikiTitle);
      if (wikiData) { wikiSummary = wikiData.extract; speciesWikiUrl = wikiData.url; }
    }

    // Genus Wikipedia (only needed for the link — no summary)
    let genusWikiUrl = null;
    if (!speciesWikiUrl && genusWD && genusWD.wikiTitle) {
      const genusData = await callWikipediaHE(genusWD.wikiTitle);
      if (genusData) genusWikiUrl = genusData.url;
    }

    // Last fallback: Hebrew Wikipedia full-text search with genus validation
    let finalHebrewName = hebrewName;
    let finalWikiSummary = wikiSummary;
    let finalSpeciesWikiUrl = speciesWikiUrl;
    if (!speciesWikiUrl) {
      const wikiSearch = await searchWikipediaHE(sciName);
      if (wikiSearch) {
        finalSpeciesWikiUrl = wikiSearch.url;
        if (!finalHebrewName) finalHebrewName = wikiSearch.title;
        if (!finalWikiSummary) finalWikiSummary = wikiSearch.extract;
      }
    }

    const moreInfoUrl = buildMoreInfoUrl(finalSpeciesWikiUrl, genusWikiUrl, sciName);

    // Fetch KKL structured data using the Hebrew name (if we have one)
    const kklData = finalHebrewName ? await fetchKKLData(finalHebrewName) : null;

    renderResult({ hebrewName: finalHebrewName, sciName, family: familySci, hebrewFamily, score, apiImageURL, wikiSummary: finalWikiSummary, moreInfoUrl, kklData });
  }

  function extractCandidate(result) {
    return {
      sciName:   result.species.scientificNameWithoutAuthor || '',
      familySci: result.species.family ? result.species.family.scientificNameWithoutAuthor : '',
      score:     result.score,
      imageURL:  (result.species.images && result.species.images.length > 0)
                   ? (result.species.images[0].url && result.species.images[0].url.m)
                   : null,
    };
  }

  async function processResult(plantnetJson) {
    const results = (plantnetJson && plantnetJson.results) ? plantnetJson.results : [];
    const best    = results[0];

    if (!best || best.score < CONFIDENCE_THRESHOLD) {
      renderError('not_found');
      return;
    }

    // Helper: quick Hebrew name check (Wikidata + iNaturalist only, no slow Wikipedia search)
    async function quickHebrewCheck(sciName) {
      const [wdRes, inatRes] = await Promise.allSettled([
        callWikidata(sciName),
        callInatTaxa(sciName),
      ]);
      const wd   = wdRes.status   === 'fulfilled' ? wdRes.value   : null;
      const inat = inatRes.status === 'fulfilled' ? inatRes.value : null;
      if (DEBUG_MODE) console.log(`Hebrew check [${sciName}]: Wikidata="${wd?.hebrewLabel || '-'}", iNat="${inat || '-'}"`);
      return !!(wd?.hebrewLabel || inat);
    }

    // High confidence — but verify it's an Israeli species first
    if (best.score >= CONFIDENCE_LOW) {
      const c = extractCandidate(best);
      const hasHebrew = await quickHebrewCheck(c.sciName);
      if (DEBUG_MODE) console.log(`High-confidence "${c.sciName}" (${Math.round(c.score*100)}%): hasHebrew=${hasHebrew}`);
      if (hasHebrew) {
        await resolveAndRender(c.sciName, c.familySci, c.score, c.imageURL);
        return;
      }
      if (DEBUG_MODE) console.warn(`"${c.sciName}" failed Hebrew filter — demoting to candidates`);
      // Fall through to candidates flow below
    }

    // Low-medium confidence, or high-confidence result that failed Israel filter
    // Check up to 5 PlantNet results to find Israeli species
    const pool = results.slice(0, 5).map(extractCandidate);

    const hebrewChecks = await Promise.allSettled(
      pool.map(async c => ({ ...c, hasHebrew: await quickHebrewCheck(c.sciName) }))
    );

    const checked  = hebrewChecks.filter(r => r.status === 'fulfilled').map(r => r.value);
    const filtered = checked.filter(c => c.hasHebrew);

    if (DEBUG_MODE) {
      console.log('Pool of 5:', pool.map(c => c.sciName));
      console.log('Passed Hebrew filter:', filtered.map(c => c.sciName));
    }

    if (filtered.length === 0) {
      if (DEBUG_MODE) console.warn('All 5 candidates failed Hebrew filter → no_israeli_match');
      renderError('no_israeli_match');
      return;
    }

    // Show up to 3 of the Israeli-confirmed candidates
    const finalCandidates = filtered.slice(0, 3);

    // Only one viable candidate after filtering — skip selection screen
    if (finalCandidates.length === 1) {
      const c = finalCandidates[0];
      await resolveAndRender(c.sciName, c.familySci, c.score, c.imageURL);
      return;
    }

    // Fetch English Wikipedia thumbnails for remaining candidates in parallel
    await Promise.allSettled(finalCandidates.map(async c => {
      c.imageURL = c.imageURL || await fetchEnWikiThumbnail(c.sciName);
    }));

    renderCandidates(finalCandidates);
  }

  function renderCandidates(candidates) {
    const list = document.getElementById('candidates-list');
    list.innerHTML = '';

    candidates.forEach(c => {
      const card = document.createElement('div');
      card.className = 'candidate-card';
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');

      const thumbSrc = c.imageURL;
      if (thumbSrc) {
        const img = document.createElement('img');
        img.className = 'candidate-thumb';
        img.src = thumbSrc;
        img.alt = c.sciName;
        img.onerror = () => { img.replaceWith(placeholder()); };
        card.appendChild(img);
      } else {
        card.appendChild(placeholder());
      }

      const info = document.createElement('div');
      info.className = 'candidate-info';
      info.innerHTML = `<div class="candidate-sci">${c.sciName}</div>
                        <div class="candidate-family">${c.familySci}</div>`;
      card.appendChild(info);

      const badge = document.createElement('span');
      badge.className = 'candidate-score';
      badge.textContent = Math.round(c.score * 100) + '%';
      card.appendChild(badge);

      const pick = () => resolveAndRender(c.sciName, c.familySci, c.score, c.imageURL);
      card.addEventListener('click', pick);
      card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') pick(); });

      list.appendChild(card);
    });

    showScreen('candidates');
  }

  function placeholder() {
    const el = document.createElement('div');
    el.className = 'candidate-thumb-placeholder';
    el.textContent = '🌸';
    return el;
  }

  function renderResult({ hebrewName, sciName, family, hebrewFamily, score, apiImageURL, wikiSummary, moreInfoUrl, kklData }) {
    const imgWrap = document.getElementById('result-img-wrap');
    imgWrap.innerHTML = '';

    if (STATE.previewDataURL || apiImageURL) {
      const img = document.createElement('img');
      img.className = 'result-photo';
      img.alt = hebrewName || sciName || 'תמונת הפרח';
      img.src = STATE.previewDataURL || apiImageURL;
      if (STATE.previewDataURL && apiImageURL) {
        img.onerror = () => { img.src = apiImageURL; img.onerror = null; };
      }
      imgWrap.appendChild(img);
    } else {
      const ph = document.createElement('div');
      ph.className = 'result-photo-placeholder';
      ph.textContent = '🌸';
      imgWrap.appendChild(ph);
    }

    // Confidence badge — visible only in debug mode
    const badge = document.getElementById('result-confidence');
    badge.textContent = `ביטחון ${Math.round(score * 100)}%`;
    badge.style.display = DEBUG_MODE ? 'inline-block' : 'none';

    // Hebrew name large, scientific name small beneath
    document.getElementById('result-heb-name').textContent = hebrewName || sciName || '—';
    document.getElementById('result-sci-name').textContent = hebrewName ? sciName : '';

    const familyDisplay = hebrewFamily || family;
    if (familyDisplay) {
      document.getElementById('result-family').textContent       = familyDisplay;
      document.getElementById('result-family-row').style.display = 'flex';
    } else {
      document.getElementById('result-family-row').style.display = 'none';
    }

    // Wikipedia first paragraph or nothing
    document.getElementById('result-summary').textContent = wikiSummary || '';

    // ── KKL structured data grid ──────────────────────────────────────────
    const kklDiv = document.getElementById('result-kkl-data');
    if (kklData && Object.values(kklData).some(v => v && !['plantId','kklUrl','_rawSnippet'].includes(v))) {
      const val = (v) => v
        ? `<span class="kkl-value">${v}</span>`
        : `<span class="kkl-value empty">—</span>`;

      const fields = [
        { label: 'שם עממי',        value: kklData.englishName,     wide: false },
        { label: 'שם ערבי',        value: kklData.arabicName,      wide: false },
        { label: 'מס׳ עלי כותרת', value: kklData.petalCount,      wide: false },
        { label: 'צורת העלה',      value: kklData.leafShape,       wide: false },
        { label: 'שפת העלה',       value: kklData.leafEdge,        wide: false },
        { label: 'צורת חיים',      value: kklData.lifeForm,        wide: false },
        { label: 'צורת הגבעול',    value: kklData.stemShape,       wide: false },
        { label: 'בית גידול',      value: kklData.habitat,         wide: false },
        { label: 'עונת הפריחה',    value: kklData.floweringSeason, wide: false },
        { label: 'תפוצה בארץ',     value: kklData.distribution,    wide: true  },
      ];

      const gridHTML = fields.map(f =>
        `<div class="kkl-field${f.wide ? ' full-width' : ''}">
          <span class="kkl-label">${f.label}</span>
          ${val(f.value)}
        </div>`
      ).join('');

      const kklLink = kklData.kklUrl
        ? `<div class="kkl-url-row"><a href="${kklData.kklUrl}" target="_blank" rel="noopener">מקור: KKL ↗</a></div>`
        : '';

      kklDiv.innerHTML = `<div class="kkl-grid">${gridHTML}</div>${kklLink}`;
      kklDiv.style.display = '';
    } else {
      kklDiv.style.display = 'none';
    }

    // "More info" button — prefer KKL URL, then Wikipedia/flora fallback
    const moreBtn = document.getElementById('result-more-info');
    const finalMoreUrl = (kklData && kklData.kklUrl) || moreInfoUrl;
    if (finalMoreUrl) {
      moreBtn.href = finalMoreUrl;
      moreBtn.style.display = '';
    } else {
      moreBtn.style.display = 'none';
    }

    showScreen('result');
  }

  // ===== Error Handling =====

  const ERROR_CONFIGS = {
    not_found: {
      icon: '🌿',
      title: 'פרח לא נמצא',
      message: 'לא הצלחנו לזהות את הפרח. נסה לצלם שוב:',
      tips: [
        'התקרב לפרח — מלא את רוב המסגרת',
        'התרחק מעט אם הפרח גדול מאוד',
        'הקש על המסך לפני הצילום כדי להתמקד',
        'צלם באור יום טבעי — הימנע מפלאש',
        'הימנע מרקע עמוס — שמיים או קיר נקי עדיפים',
        'ודא שהפרח במרכז התמונה',
      ]
    },
    no_israeli_match: {
      icon: '📷',
      title: 'לא זוהה פרח ישראלי',
      message: 'לא הצלחנו להתאים את הצילום לפרח ישראלי מוכר. נסה לצלם מחדש:',
      tips: [
        'התקרב לפרח — מלא את רוב המסגרת',
        'הקש על המסך לפני הצילום כדי להתמקד',
        'צלם את הפרח בלבד, ללא עלים או ענפים אחרים',
        'צלם באור יום טבעי — הימנע מפלאש',
        'נסה זווית אחרת — מלפנים או מהצד',
      ]
    },
    network: {
      icon: '📡',
      title: 'שגיאת תקשורת',
      message: 'לא ניתן להתחבר לשירות הזיהוי. בדוק את חיבור האינטרנט שלך ונסה שוב.',
      tips: []
    },
    api_error: {
      icon: '⚠️',

      tips: []
    },
  };

  function renderError(type, httpStatus) {
    const cfg = ERROR_CONFIGS[type] || ERROR_CONFIGS.api_error;
    document.getElementById('error-icon').textContent    = cfg.icon;
    document.getElementById('error-title').textContent   = cfg.title;
    const statusNote = httpStatus ? ` (שגיאה ${httpStatus})` : '';
    document.getElementById('error-message').textContent = cfg.message + statusNote;

    const tipsList = document.getElementById('error-tips');
    if (cfg.tips && cfg.tips.length > 0) {
      tipsList.innerHTML = cfg.tips.map(t => `<li>${t}</li>`).join('');
      tipsList.style.display = 'block';
    } else {
      tipsList.innerHTML = '';
      tipsList.style.display = 'none';
    }
    showScreen('error');
  }

  // ===== Main Identify Function =====
  // Accepts a Blob so future video-frame capture can call this directly

  async function identifyFlower(blob, filename) {
    showScreen('loading');
    try {
      // Fetch GPS once and cache; fall back to Israel center if denied
      if (!STATE.gpsCoords) {
        STATE.gpsCoords = await getGPS() || { lat: ISRAEL_LAT, lon: ISRAEL_LON };
      }

      const plantnetJson = await callPlantNetAPI(blob, filename);

      if (DEBUG_MODE) {
        console.group('🌸 Flower ID Debug');
        const top3 = plantnetJson?.results?.slice(0, 3) || [];
        top3.forEach((r, i) => {
          console.log(`Result ${i + 1} (${Math.round(r.score * 100)}%):`, r.species?.scientificNameWithoutAuthor,
            '| images:', r.species?.images?.length ?? 'none',
            r.species?.images?.[0]?.url?.m ?? '(no URL)');
        });
        console.groupEnd();
      }

      await processResult(plantnetJson);

    } catch (err) {
      if (err.type === 'api') renderError('api_error', err.status);
      else renderError('network');
    }
  }

  // ===== State Reset =====

  function resetState() {
    STATE.currentFile    = null;
    STATE.previewDataURL = null;
    document.getElementById('preview-img').src       = '';
    document.getElementById('result-img-wrap').innerHTML = '';
  }

  // ===== Event Binding =====

  function bindEvents() {
    document.getElementById('input-camera').addEventListener('change',  handleFileSelected);
    document.getElementById('input-gallery').addEventListener('change', handleFileSelected);

    document.getElementById('btn-camera').addEventListener('click', () => {
      const inp = document.getElementById('input-camera');
      inp.value = '';
      inp.click();
    });
    document.getElementById('btn-gallery').addEventListener('click', () => {
      const inp = document.getElementById('input-gallery');
      inp.value = '';
      inp.click();
    });

    document.getElementById('btn-identify').addEventListener('click', () => {
      if (STATE.currentFile) identifyFlower(STATE.currentFile, STATE.currentFile.name);
    });
    document.getElementById('btn-retake').addEventListener('click', () => {
      resetState();
      showScreen('landing');
    });

    document.getElementById('btn-back').addEventListener('click', () => {
      const active = document.querySelector('.screen.active');
      const id = active ? active.id.replace('screen-', '') : '';
      if (id === 'preview') {
        resetState();
        showScreen('landing');
      } else if (id === 'candidates') {
        showScreen(STATE.currentFile ? 'preview' : 'landing');
      } else {
        showScreen(STATE.currentFile ? 'preview' : 'landing');
      }
    });

    document.getElementById('btn-new-search').addEventListener('click', () => {
      resetState();
      showScreen('landing');
    });
    document.getElementById('btn-candidates-new').addEventListener('click', () => {
      resetState();
      showScreen('landing');
    });
    document.getElementById('btn-try-again').addEventListener('click', () => {
      showScreen(STATE.currentFile ? 'preview' : 'landing');
    });
  }

  // ===== Init =====

  // ===== KKL Proxy ===================================================
  const KKL_FUNCTION = '/.netlify/functions/kkl';

  async function fetchKKLData(hebrewName) {
    try {
      const url = `${KKL_FUNCTION}?name=${encodeURIComponent(hebrewName)}`;
      if (DEBUG_MODE) console.log('🌿 Fetching KKL:', url);
      const resp = await fetch(url);
      if (!resp.ok) return null;
      const data = await resp.json();
      if (data.error) { if (DEBUG_MODE) console.warn('KKL error:', data.error); return null; }
      if (DEBUG_MODE) console.log('KKL data:', data);
      return data;
    } catch (e) {
      if (DEBUG_MODE) console.warn('KKL fetch failed:', e.message);
      return null;
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    bindEvents();
    showScreen('landing');
  });
  </script>
</body>
</html>
